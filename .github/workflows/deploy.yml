name: Deploy to Shopify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme to Shopify
        run: |
          shopify theme push \
            --store 1t9ayp-tw.myshopify.com \
            --theme 184913330495 \
            --allow-live \
            --force \
            --only sections/uburn-pdp.liquid \
            --only sections/main-uburn-pdp-v9.liquid \
            --only assets/uburn-pdp-v9.css \
            --only templates/product.uburn-v9.json
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
