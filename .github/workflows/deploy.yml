name: Deploy to Shopify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme to Shopify
        run: |
          shopify theme push \
            --store 1t9ayp-tw.myshopify.com \
            --theme 185705234751 \
            --allow-live \
            --force \
            --only "sections/uburn-pdp.liquid,sections/ub-home-v2.liquid,sections/main-uburn-home.liquid,assets/uburn-home.css,templates/index.uburn-v2.json,templates/index.json,templates/product.json"
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
