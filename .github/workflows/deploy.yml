name: Deploy to Shopify

# AUTO-DEPLOY DISABLED 2026-06-10 — re-enable only with explicit GO from Charles
# Reason: all deploys must be manual during Phase-1 US ads test (budget €1250).
# To re-enable: uncomment the on/push block below and remove the on/workflow_dispatch fallback.
#
# on:
#   push:
#     branches: [main]

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm manual deploy"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme to Shopify
        run: |
          shopify theme push \
            --store 1t9ayp-tw.myshopify.com \
            --theme 185705234751 \
            --allow-live \
            --force \
            --only sections/uburn-pdp.liquid \
            --only sections/ub-home-v2.liquid \
            --only sections/main-uburn-home.liquid \
            --only assets/uburn-home.css \
            --only templates/index.uburn-v2.json \
            --only templates/index.json \
            --only templates/product.json
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
